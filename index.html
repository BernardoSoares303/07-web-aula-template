<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Site de Notícias</title>
    <link rel="stylesheet" href="./assets/css/login/estilo.css" />
    <script src="./assets/js/login.js" type="module"></script>
    <script
      src="https://kit.fontawesome.com/b581796bdd.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="logo">B</div>
      <h1 class="titulo">Meu Site de Notícias</h1>
    </header>
    <div class="container">
      <h1>Login</h1>
      <form>
        <div class="input-grupo">
          <i class="fas fa-envelope"></i>
          <input id="email" type="email" placeholder="Informe seu e-mail" />
        </div>
        <div class="input-grupo">
          <i class="fas fa-lock"></i>
          <input id="senha" type="password" placeholder="Informe sua senha" />
        </div>
        <button>
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
      </form>
      <div class="links-auxiliares">
        <a href="#">Esqueceu a senha?</a>
        <span>-</span>
        <a href="#">Registre-se</a>
      </div>
    </div>
  </body>
</html>
